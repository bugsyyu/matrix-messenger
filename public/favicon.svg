<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges">
  <title>Matrix Messenger</title>
  <desc>Green CRT terminal cursor &gt;_ on black, with subtle scanlines.</desc>
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="2" height="2" patternUnits="userSpaceOnUse">
      <rect width="2" height="1" fill="#000805"/>
      <rect y="1" width="2" height="1" fill="#001a0c"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="64" height="64" fill="#000805"/>
  <rect width="64" height="64" fill="url(#scanlines)" opacity="0.55"/>

  <!-- the ">_" terminal cursor, monospace-feel via hand-tuned vector strokes -->
  <g fill="#00ff41" filter="url(#glow)">
    <!-- ">" chevron, two thick strokes meeting at right -->
    <polygon points="14,16 16,16 34,32 16,48 14,48 32,32"/>
    <!-- "_" underscore cursor -->
    <rect x="36" y="44" width="16" height="4"/>
  </g>

  <!-- bright head highlight on the chevron tip -->
  <circle cx="34" cy="32" r="1.6" fill="#bfffd0"/>
</svg>
