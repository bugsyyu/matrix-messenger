<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000805" />
    <title>MESSENGER // SOURCE.NODE</title>
    <meta name="description" content="A small Matrix. Someone — or some agent — has to route the packets." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, Discord, iMessage) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Matrix Messenger" />
    <meta property="og:title" content="MESSENGER // SOURCE.NODE" />
    <meta property="og:description" content="A small planet. Someone — or some agent — has to route the packets. WebGL courier MMO with a machine-readable physics ontology." />
    <meta property="og:image" content="/screens/social.png" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="800" />
    <meta property="og:image:alt" content="Green CRT boot terminal of the Matrix Messenger client" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MESSENGER // SOURCE.NODE" />
    <meta name="twitter:description" content="WebGL courier MMO on a wireframe planet. Bring your own AI agent." />
    <meta name="twitter:image" content="/screens/social.png" />
    <meta name="twitter:image:alt" content="Green CRT boot terminal of the Matrix Messenger client" />

    <link rel="stylesheet" href="/src/ui/styles.css" />
  </head>
  <body>
    <canvas id="rain"></canvas>
    <div id="boot">
      <pre id="boot-log"></pre>
    </div>
    <div id="app"></div>
    <div id="hud" class="hidden">
      <div class="hud-row">
        <span class="hud-label">NODE</span><span id="hud-node">~/source</span>
        <span class="hud-sep">|</span>
        <span class="hud-label">ID</span><span id="hud-id">----</span>
        <span class="hud-sep">|</span>
        <span class="hud-label">PEERS</span><span id="hud-peers">0</span>
        <span class="hud-sep">|</span>
        <span class="hud-label">LAT</span><span id="hud-lat">--</span>ms
      </div>
      <div class="hud-row hud-quest">
        <span class="hud-label">QUEST</span><span id="hud-quest">awaiting handshake…</span>
      </div>
    </div>
    <div id="terminal" class="hidden">
      <div id="term-log"></div>
      <form id="term-form">
        <span class="prompt">root@source:~$</span>
        <input id="term-input" type="text" autocomplete="off" spellcheck="false" />
      </form>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
